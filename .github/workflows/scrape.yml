name: 定时抓取热搜

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: npm install cheerio

      - name: 抓取并解析
        run: |
          WEIBO_DATA=$(curl -s "https://weibo.com/ajax/side/hotSearch" \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://weibo.com/") || true
          ZHIHU_DATA=$(curl -s "https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total?limit=10" \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://www.zhihu.com/") || true
          WEIBO_DATA="$WEIBO_DATA" ZHIHU_DATA="$ZHIHU_DATA" node .github/workflows/scrape.mjs

      - name: 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data
          publish_branch: gh-pages
          destination_dir: ./
          keep_files: false
